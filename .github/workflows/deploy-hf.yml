name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        env:
          VITE_HF_TOKEN: ${{ secrets.HF_TOKEN }}
          VITE_HF_MODEL: ${{ vars.HF_MODEL || 'mistralai/Mistral-7B-Instruct-v0.3' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Prepare Deployment
        run: |
          mkdir -p deploy_dir
          
          # Copy everything from hf-docker first (Dockerfile, nginx.conf, etc.)
          if [ -d "hf-docker" ]; then
            cp -r hf-docker/* deploy_dir/
          fi
          
          # Copy built dist files
          mkdir -p deploy_dir/dist
          cp -r dist/* deploy_dir/dist/
          
          # Generate Metadata README
          cat > deploy_dir/README.md << 'EOF'
          ---
          title: TIVO DEV AGENT BACKEND
          emoji: 🤖
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          # TIVO DEV AGENT BACKEND — Autonomous AI Development Agent
          This space hosts the TIVO backend engine and frontend bundle.
          EOF

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          cd deploy_dir
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M:%S')"
          git remote add origin https://x-access-token:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}
          git push --force origin master:main
