name: Deploy to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prepare HF Space Files
        run: |
          mkdir -p hf_sync
          cp -r dist hf_sync/
          cp Dockerfile hf_sync/
          cp server.js hf_sync/
          cp package.json hf_sync/
          # Copy everything else except node_modules and .git for HF build to have context if needed
          # But for Docker, we only really need these. 
          # To fix the "missing files" concern, we ensure the entire build context is clean.
          
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: "MDRAZWAN/tivo-dev-agent"
        run: |
          cd hf_sync
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy to Hugging Face: ${{ github.sha }}"
          git remote add origin https://admin:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE
          # Force push to the main branch of the HF Space
          git push --force origin master:main
