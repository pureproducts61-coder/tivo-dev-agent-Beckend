name: Deploy to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prepare HF Space Files
        run: |
          mkdir -p hf_sync
          cp -r dist hf_sync/
          cp hf-docker/Dockerfile hf_sync/ || cp Dockerfile hf_sync/
          cp hf-docker/nginx.conf hf_sync/ || echo "No nginx.conf"
          cp server.js hf_sync/ || echo "No server.js"
          cp package.json hf_sync/
          
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          cd hf_sync
          git init
          git config user.name "TIVO-AI"
          git config user.email "tivo@ai.com"
          git add .
          git commit -m "Deploy to Hugging Face"
          git remote add origin https://sheikhrazwan1110:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE
          git push --force origin master:main
