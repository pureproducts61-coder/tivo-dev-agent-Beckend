name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_HF_TOKEN: ${{ secrets.HF_TOKEN }}
          VITE_HF_MODEL: ${{ vars.HF_MODEL || 'mistralai/Mistral-7B-Instruct-v0.3' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          sudo apt-get install -y git-lfs
          git lfs install

          git clone https://huggingface:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE} hf-space

          rm -rf hf-space/*

          # Copy Docker build engine files
          cp hf-docker/Dockerfile hf-space/
          cp hf-docker/server.js hf-space/
          cp hf-docker/build-apk.sh hf-space/
          cp hf-docker/build-exe.sh hf-space/
          cp hf-docker/nginx.conf hf-space/

          # Copy frontend dist
          mkdir -p hf-space/dist
          cp -r dist/* hf-space/dist/

          cat > hf-space/README.md << 'README'
          ---
          title: TIVO DEV AGENT BACKEND
          emoji: 🤖
          colorFrom: green
          colorTo: gray
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          # TIVO DEV AGENT BACKEND — Autonomous Software Factory
          Supports APK, EXE, and Web bundle builds.
          README

          cd hf-space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy TIVO Build Engine from GitHub Actions"
          git push
